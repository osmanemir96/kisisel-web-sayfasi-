<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <title>Çalışma Alanları & Harita</title>
</head>
<body>
    <nav>
        <a href="index.html">Hakkımda</a>
        <a href="hobiler.html">Çalışma Alanları & Harita</a>
        <a href="iletisim.html">İletişim</a>
    </nav>
    
    <div class="animasyon-kutu">
        <h1>Hobilerim ve İlgi Alanlarım</h1>
        <ul>
            <li>Satranç</li>
            <li>Klasik Müzik ve Jazz Müzik</li>
            <li>Golf Oynamak</li>
            <li>Cirit Atmak</li>
        </ul>

        <h2>Bulunduğum İller</h2>
        <p>Aşağıdaki haritada iş ve seyahat amacıyla bulunduğum iller renklendirilerek gösterilmiştir.</p>
        <div id="map" style="height: 550px;"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([39.0, 35.0], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        
        var bulundugumIller = [
            "İstanbul", "Erzurum", "İzmir", "Manisa", "Antalya", 
            "Ankara", "Çanakkale", "Nevşehir", "Bursa", "Kastamonu", 
            "Ardahan", "Kars", "Ordu", "Bartın", "Karabük", "Yalova", 
            "Kahramanmaraş", "Gaziantep", "Adana", "Samsun", "Bolu", 
            "Sinop", "Çankırı", "Düzce", "Zonguldak"
        ];

        fetch('https://raw.githubusercontent.com/alpers/Turkey-Maps-GeoJSON/master/tr-cities.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        var ilAdi = feature.properties.name;
                        if(bulundugumIller.includes(ilAdi)) {
                            return { color: "#2980b9", weight: 2, fillColor: "#3498db", fillOpacity: 0.6 };
                        } else {
                            return { color: "#cccccc", weight: 1, fillColor: "transparent", fillOpacity: 0 };
                        }
                    },
                    onEachFeature: function(feature, layer) {
                        var ilAdi = feature.properties.name;
                        if(bulundugumIller.includes(ilAdi)) {
                            layer.bindPopup("<b>" + ilAdi + "</b>");
                        }
                    }
                }).addTo(map);
            });

        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<h4>Harita Lejantı</h4>';
            div.innerHTML += '<i style="background: #3498db"></i> Bulunulan İller<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
