<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <title>Hobilerim & Harita</title>
</head>
<body>
    <nav>
        <a href="index.html">Hakkımda</a>
        <a href="hobiler.html">Hobilerim & Harita</a>
        <a href="iletisim.html">İletişim</a>
    </nav>
    
    <div class="animasyon-kutu">
        <h1>Hobilerim</h1>
        <ul>
            <li>Satranç</li>
            <li>Klasik Müzik</li>
            <li>Jazz Müzik</li>
        </ul>

        <h2>Seyahat Ettiğim İller</h2>
        <div id="map" style="height: 500px;"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Haritayı Türkiye'yi ortalayacak şekilde başlatıyoruz
        var map = L.map('map').setView([39.0, 35.0], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Tüm şehirlerin koordinatlarıyla tam listesi
        var noktalar = [
            ["Bursa", 40.18, 29.06], ["İstanbul", 41.00, 28.97], ["Ankara", 39.93, 32.85], 
            ["Kastamonu", 41.38, 33.78], ["Ardahan", 41.11, 42.70], ["Kars", 40.60, 43.09], 
            ["Erzurum", 39.90, 41.27], ["Ordu", 40.98, 37.87], ["Bartın", 41.63, 32.33], 
            ["Karabük", 41.20, 32.62], ["Yalova", 40.65, 29.26], ["Kahramanmaraş", 37.57, 36.93], 
            ["Gaziantep", 37.06, 37.38], ["Adana", 37.00, 35.32], ["Samsun", 41.28, 36.33], 
            ["Bolu", 40.73, 31.60], ["Çanakkale", 40.15, 26.41], ["İzmir", 38.42, 27.13], 
            ["Manisa", 38.62, 27.43], ["Nevşehir", 38.62, 34.71], ["Sinop", 42.02, 35.15], 
            ["Çankırı", 40.60, 33.61], ["Düzce", 40.84, 31.16], ["Antalya", 36.89, 30.71]
        ];
        
        noktalar.forEach(n => L.marker([n[1], n[2]]).addTo(map).bindPopup(n[0]));
    </script>
</body>
</html>
